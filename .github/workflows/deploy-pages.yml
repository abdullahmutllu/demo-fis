# GitHub Pages: Settings → Pages → "Build and deployment" kaynağı "GitHub Actions" olmalı.
# Repo adı vite.config.ts içindeki `repo` ile aynı olmalı (şu an: demo-fis).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          GITHUB_PAGES: 'true'
        run: npm run build
      - name: SPA fallback (GitHub Pages)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
